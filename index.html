<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>คลังยา รพ.สต.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--ink:#12211f;--muted:#66807c;--line:#e4ebe9;--surface:#fff;--bg:#f4f7f6;--teal:#0e6b6a;--teal-d:#0a4f4e;--ok:#1f8a44;--warn:#b26a00;--warnbg:#fdf3e2;--danger:#c62828;--dangerbg:#fbeaea;--okbg:#e9f5ee;}
body{font-family:'Noto Sans Thai',system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;padding-bottom:40px;}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
.hd{position:sticky;top:0;z-index:20;background:var(--teal-d);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.hd h1{font-size:17px;font-weight:700;}
.hd .sub{font-size:11.5px;color:#bfe0df;margin-top:2px;font-weight:500;}
.hd button{background:rgba(255,255,255,.14);border:0;color:#fff;font-family:inherit;font-size:12px;font-weight:600;padding:7px 11px;border-radius:9px;cursor:pointer;}
.wrap{max-width:640px;margin:0 auto;}
.banner{background:#fff7e6;border-bottom:1px solid #f0dca8;color:#7a5a12;font-size:12px;padding:9px 16px;text-align:center;}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:12px 12px 4px;}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 4px;text-align:center;}
.stat .n{font-size:18px;font-weight:700;line-height:1;}
.stat .l{font-size:9.5px;color:var(--muted);margin-top:5px;font-weight:600;line-height:1.2;}
.stat.warn .n{color:var(--warn);}.stat.danger .n{color:var(--danger);}.stat.teal .n{color:var(--teal);}.stat.reorder .n{color:#7a4dd0;}
.tools{padding:8px 12px 2px;}
.search{width:100%;border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:11px 14px;font-size:15px;font-family:inherit;color:var(--ink);}
.search:focus{outline:2px solid var(--teal);border-color:var(--teal);}
.row2{display:flex;gap:8px;align-items:center;padding:10px 12px 4px;}
.chips{display:flex;gap:7px;overflow-x:auto;flex:1;}
.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;flex:0 0 auto;}
.chip.on{background:var(--teal);border-color:var(--teal);color:#fff;}
.toggle{white-space:nowrap;border:1px solid var(--teal);background:var(--surface);color:var(--teal);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;flex:0 0 auto;}
.toggle.on{background:var(--teal);color:#fff;}
.list{padding:4px 12px 12px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px;cursor:pointer;}
.card:active{background:#fafcfb;}
.card.alert{border-left:4px solid var(--danger);}
.card.near{border-left:4px solid var(--warn);}
.card.reorder{border-left:4px solid #7a4dd0;}
.crow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.cname{font-size:15px;font-weight:600;line-height:1.3;}
.cmeta{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.code{font-weight:600;color:var(--teal);}
.dot{width:3px;height:3px;border-radius:50%;background:var(--muted);opacity:.5;}
.qty{text-align:right;flex:0 0 auto;}
.qty .num{font-size:19px;font-weight:700;line-height:1;}
.qty .unit{font-size:10px;color:var(--muted);margin-top:3px;}
.qty.zero .num{color:#b6c4c1;}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.badge{font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;}
.b-ok{background:var(--okbg);color:var(--ok);}.b-warn{background:var(--warnbg);color:var(--warn);}
.b-danger{background:var(--dangerbg);color:var(--danger);}.b-none{background:#f0f3f2;color:#849693;}
.b-re{background:#f1ebfb;color:#7a4dd0;}
.lots{margin-top:11px;border-top:1px dashed var(--line);padding-top:10px;display:flex;flex-direction:column;gap:7px;}
.lot{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;}
.lot .lk{color:var(--muted);}.lot .lc{font-weight:600;}
.empty{text-align:center;color:var(--muted);padding:44px 20px;font-size:14px;}
.setup{max-width:520px;margin:36px auto;padding:0 20px;text-align:center;}
.setup h2{font-size:19px;color:var(--teal-d);margin-bottom:10px;}
.setup p{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:14px;text-align:left;}
.setup ol{text-align:left;font-size:13px;color:var(--muted);line-height:1.7;margin:0 0 14px 18px;}
.setup input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:13px;font-family:'IBM Plex Mono',monospace;margin-bottom:12px;}
.btn{background:var(--teal);color:#fff;border:0;border-radius:11px;padding:12px 20px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;}
.btn.ghost{background:transparent;color:var(--muted);font-weight:600;margin-top:10px;font-size:13px;}
.modal{position:fixed;inset:0;background:rgba(10,30,29,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal .box{background:#fff;border-radius:16px;padding:22px;max-width:480px;width:100%;}
.modal h3{font-size:16px;margin-bottom:8px;color:var(--teal-d);}
.modal p{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:12px;}
.foot{text-align:center;font-size:11px;color:var(--muted);padding:14px;}
</style>
</head>

var NEAR_DAYS = 180;

              q: "", type: "all", usedOnly: true, open: null, showSetup: !SHEET_ID, showConfig: false };

// ---------- data source (Google Sheets via gviz CSV) ----------
function deriveId(u){ u=(u||'').trim(); var m=u.match(/\/d\/([a-zA-Z0-9\-_]+)/); return m?m[1]:u; }
function gviz(sheet){ return 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(sheet)+'&t='+Date.now(); }

function parseCSV(text){
  var rows=[], row=[], i=0, field='', inQ=false, c;
  text=String(text).replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  while(i<text.length){
    c=text[i];
    if(inQ){ if(c=='"'){ if(text[i+1]=='"'){field+='"';i+=2;continue;} inQ=false;i++;continue;} field+=c;i++;continue; }
    if(c=='"'){inQ=true;i++;continue;}
    if(c==','){row.push(field);field='';i++;continue;}
    if(c=='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
    field+=c;i++;
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows;
}
function csvToObjects(text){
  var rows=parseCSV(text); if(!rows.length) return [];
  var head=rows[0].map(function(h){return String(h).trim();});
  return rows.slice(1).map(function(r){var o={};head.forEach(function(h,idx){o[h]=(r[idx]!=null?r[idx]:'');});return o;});
}
function pad(n){ n=String(n); return n.length<2?'0'+n:n; }
function normDate(v){
  if(!v) return null; v=String(v).trim(); if(!v) return null;
  var m=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m){ var y=+m[3]; if(y>2400) y-=543; return y+'-'+pad(+m[2])+'-'+pad(+m[1]); }
  m=v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m){ return m[1]+'-'+pad(+m[2])+'-'+pad(+m[3]); }
  return null;
}
function num(v){ if(v==null) return 0; return parseFloat(String(v).replace(/,/g,''))||0; }

function buildFromCsv(master, lots){
  var drugs={}, order=[];
  master.forEach(function(r){
    var code=String(r['รหัสยา']||'').trim(); if(!code) return;
    drugs[code]={code:code,name:r['ชื่อยา'],type:r['ประเภท'],form:r['รูปแบบ'],group:(r['กลุ่ม']||'').trim(),
      packSize:r['ขนาดแพ็ก'],packPrice:r['ราคา/แพ็ก'],
      used:String(r['เบิกใช้จริง']||'').trim()==='ใช่', lots:[], total:0};
    order.push(code);
  });
  lots.forEach(function(r){
    var code=String(r['รหัสยา']||'').trim(); if(!code||!drugs[code]) return;
    var qty=num(r['คงเหลือ']); var lotNo=String(r['LOT']||'').trim();
    if(qty<=0 && !lotNo) return;
    drugs[code].lots.push({lot:lotNo||null, exp:normDate(r['วันหมดอายุ']), qty:qty});
    drugs[code].total+=qty;
  });
  return order.map(function(c){return drugs[c];});
}
function fetchCsv(sheet){
  return fetch(gviz(sheet)).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(function(t){ if(/DOCTYPE html/i.test(t)) throw new Error('เข้าถึงชีตไม่ได้'); return csvToObjects(t); });
}
function load(){
  if(!SHEET_ID){ return; }
  state.loading=true; state.error=""; render();
  Promise.all([fetchCsv(REG_SHEET), fetchCsv(LOT_SHEET)])
   .then(function(res){
      state.drugs=buildFromCsv(res[0],res[1]); state.updated=new Date().toISOString();
      state.live=true; state.showSetup=false; state.loading=false; render();
   })
   .catch(function(e){
      state.loading=false;
      state.error='ดึงข้อมูลไม่สำเร็จ ('+e.message+') — ตรวจว่าแชร์ชีตเป็น “ทุกคนที่มีลิงก์ = ผู้อ่าน” และชื่อแท็บคือ ทะเบียนยา / ล็อตคงคลัง';
      render();
   });
}
function saveSheet(u){
  SHEET_ID = deriveId(u);
  try{ localStorage.setItem('drug_sheet_id', SHEET_ID); }catch(e){}
  state.showConfig=false; state.showSetup=!SHEET_ID;
  if(SHEET_ID) load(); else render();
}

// ---------- helpers ----------
function daysTo(iso){ if(!iso) return null; var d=new Date(iso+'T00:00:00'); return Math.round((d-new Date().setHours(0,0,0,0))/86400000); }
function fmt(iso){ if(!iso) return '—'; var d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'}); }
function fmtTime(iso){ if(!iso) return ''; var d=new Date(iso); return d.toLocaleString('th-TH',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function statusOf(d){
  if(d.total>0){
    var worst='ok', hasExp=false;
    d.lots.forEach(function(l){ if(!l.qty) return; var dd=daysTo(l.exp); if(dd===null) return; hasExp=true;
      if(dd<0) worst='expired'; else if(dd<=NEAR_DAYS && worst!=='expired') worst='near'; });
    return worst;
  }
  return d.used ? 'reorder' : 'ref';
}

function render(){
  var root=document.getElementById('root');
  if(state.showSetup){ root.innerHTML=setupHTML(); bind(); return; }
  var d=state.drugs.map(function(x){ return Object.assign({}, x, {st: statusOf(x)}); });
  var stats={ items:d.length, stock:d.filter(function(x){return x.total>0;}).length,
    near:d.filter(function(x){return x.st==='near';}).length,
    exp:d.filter(function(x){return x.st==='expired';}).length,
    reorder:d.filter(function(x){return x.st==='reorder';}).length };
  var q=state.q.trim().toLowerCase();
  var f=d.filter(function(x){
    if(state.usedOnly && !x.used) return false;
    if(state.type!=='all' && x.type!==state.type) return false;
    if(!q) return true;
    return (x.name||'').toLowerCase().indexOf(q)>-1 || (x.code||'').toLowerCase().indexOf(q)>-1;
  });
  var rank=function(x){ return {expired:0,reorder:1,near:2,ok:3,ref:4}[x.st]; };
  f.sort(function(a,b){ return rank(a)-rank(b); });
  var types=["ยาทั่วไป","วัคซีน","ยาคุมกำเนิด","ยาสมุนไพร/แผนไทย","วัสดุ/เวชภัณฑ์"];
  var html='';
  html+='<div class="hd"><div><h1>คลังยา รพ.สต.</h1><div class="sub">'+
    (state.live?('ข้อมูลสด · อัปเดต '+fmtTime(state.updated)):'โหมดตัวอย่าง (ยังไม่เชื่อมต่อ)')+
    '</div></div><div><button onclick="window.__reload()">'+(state.loading?'กำลังโหลด…':'รีเฟรช')+'</button> '+
    '<button onclick="window.__cfg()">ตั้งค่า</button></div></div>';
  html+='<div class="wrap">';
  if(!state.live) html+='<div class="banner">กำลังแสดงข้อมูลตัวอย่าง — กด “ตั้งค่า” เพื่อเชื่อม Google Sheets ให้เป็นข้อมูลสด</div>';
  if(state.error) html+='<div class="banner" style="background:#fbeaea;border-color:#f0b8b8;color:#a02020">'+esc(state.error)+'</div>';
  html+='<div class="stats">'+
    stat('teal',stats.items,'รายการ')+stat('',stats.stock,'มีสต็อก')+
    stat('reorder',stats.reorder,'ต้องเบิกเพิ่ม')+stat('warn',stats.near,'ใกล้หมดอายุ')+
    stat('danger',stats.exp,'หมดอายุ')+'</div>';
  html+='<div class="tools"><input class="search" id="q" placeholder="ค้นหาชื่อยา หรือ รหัสยา…" value="'+esc(state.q)+'"></div>';
  html+='<div class="row2"><div class="chips">'+chip('all','ทั้งหมด')+types.map(function(t){return chip(t,t);}).join('')+
    '</div><button class="toggle '+(state.usedOnly?'on':'')+'" onclick="window.__toggleUsed()">'+(state.usedOnly?'เฉพาะเบิกใช้':'ดูทั้งหมด')+'</button></div>';
  html+='<div class="list">';
  if(f.length===0) html+='<div class="empty">ไม่พบรายการ</div>';
  f.forEach(function(x){ html+=card(x); });
  html+='<div class="foot">แสดง '+f.length+' รายการ · เตือนใกล้หมดอายุภายใน '+NEAR_DAYS+' วัน</div>';
  html+='</div></div>';
  if(state.showConfig) html+=configHTML();
  root.innerHTML=html; bind();
}
function stat(cls,n,l){ return '<div class="stat '+cls+'"><div class="n mono">'+n+'</div><div class="l">'+l+'</div></div>'; }
function chip(val,label){ return '<button class="chip '+(state.type===val?'on':'')+'" onclick="window.__setType(\''+val.replace(/'/g,"\\'")+'\')">'+esc(label)+'</button>'; }
function card(x){
  var cls=x.st==='expired'?'alert':x.st==='near'?'near':x.st==='reorder'?'reorder':'';
  var badge='';
  if(x.st==='expired') badge='<span class="badge b-danger">● มีล็อตหมดอายุ</span>';
  else if(x.st==='near') badge='<span class="badge b-warn">● ใกล้หมดอายุ</span>';
  else if(x.st==='reorder') badge='<span class="badge b-re">● ต้องเบิกเพิ่ม</span>';
  else if(x.st==='ok') badge='<span class="badge b-ok">● อายุปกติ</span>';
  else badge='<span class="badge b-none">รายการอ้างอิง</span>';
  var lotcount=x.lots.filter(function(l){return l.qty;}).length;
  var open=state.open===x.code;
  var h='<div class="card '+cls+'" onclick="window.__open(\''+esc(x.code)+'\')">';
  h+='<div class="crow"><div style="min-width:0"><div class="cname">'+esc(x.name)+'</div>'+
     '<div class="cmeta"><span class="code mono">'+esc(x.code)+'</span><span class="dot"></span><span>'+esc(x.form)+'</span>'+
     (x.group?'<span class="dot"></span><span>'+esc(x.group)+'</span>':'')+'</div></div>'+
     '<div class="qty '+(x.total>0?'':'zero')+'"><div class="num mono">'+(x.total>0?x.total.toLocaleString():'—')+'</div><div class="unit">คงเหลือ</div></div></div>';
  h+='<div class="badges">'+badge+(x.total>0?'<span class="badge b-none">'+lotcount+' ล็อต</span>':'')+'</div>';
  if(open && x.lots.length){
    h+='<div class="lots">';
    x.lots.forEach(function(l){
      var dd=daysTo(l.exp);
      var col=dd===null?'var(--muted)':dd<0?'var(--danger)':dd<=NEAR_DAYS?'var(--warn)':'var(--ok)';
      h+='<div class="lot"><span class="lk">LOT <span class="lc mono">'+esc(l.lot||'—')+'</span></span>'+
         '<span style="display:flex;gap:14px;align-items:center"><span style="color:'+col+';font-size:11.5px">หมดอายุ '+fmt(l.exp)+'</span>'+
         '<span class="mono" style="font-weight:600;min-width:52px;text-align:right">'+(l.qty?l.qty.toLocaleString():'—')+'</span></span></div>';
    });
    h+='</div>';
  }
  h+='</div>'; return h;
}

    '<h3>ตั้งค่าการเชื่อมต่อ</h3><p>วางลิงก์ Google Sheet (ต้องแชร์เป็น “ทุกคนที่มีลิงก์ = ผู้อ่าน”)</p>'+
    '<input class="search" id="url2" style="font-family:IBM Plex Mono,monospace;margin-bottom:12px" value="'+esc(SHEET_ID?('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/edit'):'')+'" placeholder="https://docs.google.com/spreadsheets/d/..../edit">'+
    '<button class="btn" onclick="window.__save2()">บันทึกและโหลดใหม่</button>'+
    '<button class="btn ghost" onclick="window.__closeCfg()">ปิด</button></div></div>';
}
function bind(){
  var q=document.getElementById('q');
  if(q){ q.oninput=function(){ state.q=this.value; var p=this.selectionStart; render();
    var n=document.getElementById('q'); if(n){ n.focus(); try{n.setSelectionRange(p,p);}catch(e){} } }; }
}
window.__open=function(c){ state.open=state.open===c?null:c; render(); };
window.__setType=function(t){ state.type=t; render(); };
window.__toggleUsed=function(){ state.usedOnly=!state.usedOnly; render(); };
window.__reload=function(){ if(SHEET_ID) load(); else render(); };
window.__cfg=function(){ state.showConfig=true; render(); };
window.__closeCfg=function(){ state.showConfig=false; render(); };
window.__save=function(){ saveSheet(document.getElementById('url').value); };
window.__save2=function(){ saveSheet(document.getElementById('url2').value); };
window.__demo=function(){ state.showSetup=false; render(); };
if(SHEET_ID) load(); else render();
</script>
</body>
</html>
